version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: capitaloffer_db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: capitaloffer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: capitaloffer_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Django Backend API (Python 3.13, Django 5.x)
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: capitaloffer_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-secret-key-change-in-production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=capitaloffer
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DJANGO_SETTINGS_MODULE=settings
    volumes:
      - ./src/backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Entrypoint script handles migrations and seeding
    command: /app/entrypoint.sh

  # Vue.js Frontend Production (Nginx + Build)
  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile.ecs
    container_name: capitaloffer_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:80/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: capitaloffer_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./deployment/nginx/nginx.ecs.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/backend/static:/static:ro
      - ./src/backend/media:/media:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: capitaloffer_network
    driver: bridge
