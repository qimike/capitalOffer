version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: capitaloffer_db
    restart: unless-stopped
    ports:
      - "5433:5432"  # Changed from 5432 to 5433 to avoid conflict
    environment:
      POSTGRES_DB: capitaloffer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: capitaloffer_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Django Backend API (Production)
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: capitaloffer_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/capitaloffer
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=src.settings
      - ENV=production
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-your-domain.com,www.your-domain.com}
      - LOG_LEVEL=WARNING
    volumes:
      - ./src/backend:/app  # For development with hot reload (optional)
      - postgres_data:/var/lib/postgresql/data # Uncomment for data persistence
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: python src/manage.py runserver 0.0.0.0:3000
    profiles:
      - production

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: capitaloffer_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.ecs.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/backend/static:/static:ro
      - ./src/backend/media:/media:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - production

  # Vue.js Frontend (Production - builds static files, not dev server)
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile.ecs
    container_name: capitaloffer_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./src/backend/static:/static:ro
      - ./src/backend/media:/media:ro
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: capitaloffer_network
    driver: bridge
