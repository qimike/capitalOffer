version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: capitaloffer_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: capitaloffer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: capitaloffer_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Django Backend API
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: capitaloffer_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=postgres://postgres:postgres@db:5432/capitaloffer
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=src.settings.development
      - ENV=development
      - ALLOWED_HOSTS=localhost,127.0.0.1
    volumes:
      - ./src/backend:/app  # For development with hot reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: python src/manage.py runserver 0.0.0.0:3000

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: capitaloffer_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./src/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/backend/static:/static:ro
      - ./src/backend/media:/media:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Vue.js Frontend
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
    container_name: capitaloffer_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"  # Vue dev server
    environment:
      - VITE_API_URL=http://localhost:3000
      - NODE_ENV=development
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    profiles:
      - development

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: capitaloffer_network
    driver: bridge
